<h2>Domaine de stabilité de l'eau</h2>

<p>pH : <span id="ph_val">0.0</span></p>
<input type="range" id="ph_slider" min="0" max="12" step="0.1" value="0">

<div id="graph"></div>

<br>

<button onclick="show('titrage')">⬅ Retour</button>

<script>

// =========================
// PARAMÈTRES
// =========================
let E = [];
for (let v = -1.5; v <= 2; v += 0.01) E.push(v);

let eta_c = 0;
let eta_a = 0.5;

let k = 20;
let i0 = 1e-3;

let i_lim_c = -5e-1;
let i_lim_a = 5e-1;

let slider = document.getElementById("ph_slider");
let ph_display = document.getElementById("ph_val");

// =========================
// CALCUL
// =========================
function compute(pH) {

    let E_H2 = -0.059 * pH;
    let E_O2 = 1.23 - 0.059 * pH;

    let E_H2_reel = E_H2 - eta_c;
    let E_O2_reel = E_O2 + eta_a;

    let i_cath = [];
    let i_anod = [];

    for (let i = 0; i < E.length; i++) {

        let e = E[i];

        if (e < E_H2_reel) {
            let i_raw = -i0 * (Math.exp(-k * (e - E_H2_reel)) - 1);
            i_cath.push(i_lim_c * Math.tanh(i_raw / i_lim_c) * 1000);
        } else {
            i_cath.push(0);
        }

        if (e > E_O2_reel) {
            let i_raw = i0 * (Math.exp(k * (e - E_O2_reel)) - 1);
            i_anod.push(i_lim_a * Math.tanh(i_raw / i_lim_a) * 1000);
        } else {
            i_anod.push(0);
        }
    }
// =========================
// NERNST (SANS SURTENSION)
// =========================
let i_cath_N = [];
let i_anod_N = [];

for (let i = 0; i < E.length; i++) {

    let e = E[i];

    // cathodique Nernst
    if (e < E_H2) {
        let i_raw = -i0 * (Math.exp(-k * (e - E_H2)) - 1);
        i_cath_N.push(i_raw * 1000);
    } else {
        i_cath_N.push(0);
    }

    // anodique Nernst
    if (e > E_O2) {
        let i_raw = i0 * (Math.exp(k * (e - E_O2)) - 1);
        i_anod_N.push(i_raw * 1000);
    } else {
        i_anod_N.push(0);
    }
}

    return {
        E_H2_reel,
        E_O2_reel,
        i_cath,
        i_anod,
        i_cath_N,
        i_anod_N
    };
}

// =========================
// UPDATE GRAPH
// =========================
function updateGraph(pH) {

    ph_display.innerText = pH.toFixed(1);

    function compute(pH) {

    let E_H2 = -0.059 * pH;
    let E_O2 = 1.23 - 0.059 * pH;

    let E_H2_reel = E_H2 - eta_c;
    let E_O2_reel = E_O2 + eta_a;

    let i_cath = [];
    let i_anod = [];

    // =========================
    // COURBES RÉELLES
    // =========================
    for (let i = 0; i < E.length; i++) {

        let e = E[i];

        if (e < E_H2_reel) {
            let i_raw = -i0 * (Math.exp(-k * (e - E_H2_reel)) - 1);
            i_cath.push(i_lim_c * Math.tanh(i_raw / i_lim_c) * 1000);
        } else {
            i_cath.push(0);
        }

        if (e > E_O2_reel) {
            let i_raw = i0 * (Math.exp(k * (e - E_O2_reel)) - 1);
            i_anod.push(i_lim_a * Math.tanh(i_raw / i_lim_a) * 1000);
        } else {
            i_anod.push(0);
        }
    }

    // =========================
    // NERNST (CORRIGÉ)
    // =========================
    let i_cath_N = [];
    let i_anod_N = [];

    for (let i = 0; i < E.length; i++) {

        let e = E[i];

        if (e < E_H2) {
            let i_raw = -i0 * (Math.exp(-k * (e - E_H2)) - 1);
            i_cath_N.push(i_raw * 1000);
        } else {
            i_cath_N.push(0);
        }

        if (e > E_O2) {
            let i_raw = i0 * (Math.exp(k * (e - E_O2)) - 1);
            i_anod_N.push(i_raw * 1000);
        } else {
            i_anod_N.push(0);
        }
    }

    return {
        E_H2_reel,
        E_O2_reel,
        i_cath,
        i_anod,
        i_cath_N,
        i_anod_N
    };
}

    let layout = {
    title: "pH = " + pH.toFixed(1),

    xaxis: {title: "Potentiel E (V)", range: [-1.5, 2]},
    yaxis: {title: "Courant (mA)", range: [-100, 100]},

    shapes: shapes,

    annotations: [

        // 🔹 encadré info (équivalent Python)
        {
            x: -1.45,
            y: 95,
            xref: 'x',
            yref: 'y',
            align: 'left',
            showarrow: false,
            text:
                "pH = " + pH.toFixed(1) + "<br>" +
                "E° H₂/H⁺ = 0.00 V<br>" +
                "E° O₂/H₂O = 1.23 V<br>" +
                "ηc = " + eta_c.toFixed(2) + " V<br>" +
                "ηa = " + eta_a.toFixed(2) + " V",
            bordercolor: "#888",
            borderwidth: 1,
            bgcolor: "white"
        },

        // 🔹 annotation H2
        {
            x: data.E_H2_reel - 0.1,
            y: -10,
            text: "H₂ ← H⁺",
            showarrow: false
        },

        // 🔹 annotation O2
        {
            x: data.E_O2_reel + 0.05,
            y: 10,
            text: "H₂O → O₂",
            showarrow: false
        }
        showlegend: true,
        legend: {
        x: 0.02,
        y: 0.98
        },
    ]
};

    Plotly.newPlot('graph', [trace1, trace2, trace3, trace4], layout);
}

// =========================
// SLIDER
// =========================
slider.addEventListener("input", function() {
    let pH = parseFloat(this.value);
    frame = Math.round(pH * 10);
    updateGraph(pH);
});

// =========================
// ANIMATION
// =========================


// =========================
// CONTROLES
// =========================



// =========================
// INIT
// =========================
updateGraph(0);

</script>
