<h2>Domaine de stabilité de l'eau</h2>

<p>pH : <span id="ph_val">0.0</span></p>
<input type="range" id="ph_slider" min="0" max="12" step="0.1" value="0">

<div id="graph"></div>

<br>

<button onclick="show('titrage')">⬅ Retour</button>

<script>

// =========================
// PARAMÈTRES
// =========================
let E = [];
for (let v = -1.5; v <= 2; v += 0.01) E.push(v);

let eta_c = 0;
let eta_a = 0.5;

let k = 20;
let i0 = 1e-3;

let i_lim_c = -5e-1;
let i_lim_a = 5e-1;

let slider = document.getElementById("ph_slider");
let ph_display = document.getElementById("ph_val");

// =========================
// CALCUL
// =========================
function compute(pH) {

    let E_H2 = -0.059 * pH;
    let E_O2 = 1.23 - 0.059 * pH;

    let E_H2_reel = E_H2 - eta_c;
    let E_O2_reel = E_O2 + eta_a;

    let i_cath = [];
    let i_anod = [];

    for (let i = 0; i < E.length; i++) {

        let e = E[i];

        if (e < E_H2_reel) {
            let i_raw = -i0 * (Math.exp(-k * (e - E_H2_reel)) - 1);
            i_cath.push(i_lim_c * Math.tanh(i_raw / i_lim_c) * 1000);
        } else {
            i_cath.push(0);
        }

        if (e > E_O2_reel) {
            let i_raw = i0 * (Math.exp(k * (e - E_O2_reel)) - 1);
            i_anod.push(i_lim_a * Math.tanh(i_raw / i_lim_a) * 1000);
        } else {
            i_anod.push(0);
        }
    }
// =========================
// NERNST (SANS SURTENSION)
// =========================
let i_cath_N = [];
let i_anod_N = [];

for (let i = 0; i < E.length; i++) {

    let e = E[i];

    // cathodique Nernst
    if (e < E_H2) {
        let i_raw = -i0 * (Math.exp(-k * (e - E_H2)) - 1);
        i_cath_N.push(i_raw * 1000);
    } else {
        i_cath_N.push(0);
    }

    // anodique Nernst
    if (e > E_O2) {
        let i_raw = i0 * (Math.exp(k * (e - E_O2)) - 1);
        i_anod_N.push(i_raw * 1000);
    } else {
        i_anod_N.push(0);
    }
}

    return {
        E_H2_reel,
        E_O2_reel,
        i_cath,
        i_anod,
        i_cath_N,
        i_anod_N
    };
}

// =========================
// UPDATE GRAPH
// =========================

    function updateGraph(pH) {

    ph_display.innerText = pH.toFixed(1);

    let data = compute(pH);

    let E_H2 = -0.059 * pH;
    let E_O2 = 1.23 - 0.059 * pH;

    let trace1 = {
        x: E,
        y: data.i_cath,
        mode: 'lines',
        name: 'Réduction H+ → H2'
    };

    let trace2 = {
        x: E,
        y: data.i_anod,
        mode: 'lines',
        name: 'Oxydation H2O → O2'
    };

    let trace3 = {
        x: E,
        y: data.i_cath_N,
        mode: 'lines',
        name: 'H⁺/H₂ (Nernst)',
        line: {dash: 'dot'}
    };

    let trace4 = {
        x: E,
        y: data.i_anod_N,
        mode: 'lines',
        name: 'H₂O/O₂ (Nernst)',
        line: {dash: 'dot'}
    };

    let shapes = [
        {
            type: 'rect',
            x0: data.E_H2_reel,
            x1: data.E_O2_reel,
            y0: -100,
            y1: 100,
            fillcolor: 'green',
            opacity: 0.15,
            line: {width: 0}
        },
        {
            type: 'line',
            x0: data.E_H2_reel,
            x1: data.E_H2_reel,
            y0: -100,
            y1: 100,
            line: {dash: 'dash'}
        },
        {
            type: 'line',
            x0: data.E_O2_reel,
            x1: data.E_O2_reel,
            y0: -100,
            y1: 100,
            line: {dash: 'dash'}
        },
        {
            type: 'line',
            x0: E_H2,
            x1: E_H2,
            y0: -100,
            y1: 100,
            line: {dash: 'dot'}
        },
        {
            type: 'line',
            x0: E_O2,
            x1: E_O2,
            y0: -100,
            y1: 100,
            line: {dash: 'dot'}
        }
    ];

    let layout = {
        title: "",
        xaxis: {title: "Potentiel E (V)", range: [-1.5, 2]},
        yaxis: {title: "Courant (mA)", range: [-100, 100]},
        shapes: shapes,
        showlegend: true,
        legend: {
            x: 0.02,
            y: 0.02,
            bgcolor: "rgba(255,255,255,0.8)"
        },
        annotations: [
            {
                x: -1.45,
                y: 95,
                showarrow: false,
                align: 'left',
                text:
                    "pH = " + pH.toFixed(1) + "<br>" +
                    "E° (<sub>H<sub>2</sub>/H<sup>+</sup></sub>) = 0.00 V<br>" +
                    "E° O₂/H₂O = 1.23 V<br>" +
                    "ηc = " + eta_c.toFixed(2) + " V<br>" +
                    "ηa = " + eta_a.toFixed(2) + " V",
                bordercolor: "#888",
                borderwidth: 1,
                bgcolor: "white"
            },
            {
                x: data.E_H2_reel - 0.1,
                y: -10,
                text: "H₂ ← H⁺",
                showarrow: false
            },
            {
                x: data.E_O2_reel + 0.05,
                y: 10,
                text: "H₂O → O₂",
                showarrow: false
            }
        ]
    };

        Plotly.newPlot('graph', [trace1, trace2, trace3, trace4], layout);
}

// =========================
// SLIDER
// =========================
slider.addEventListener("input", function() {
    let pH = parseFloat(this.value);
    updateGraph(pH);
});

// =========================
// ANIMATION
// =========================


// =========================
// CONTROLES
// =========================



// =========================
// INIT
// =========================
updateGraph(0);

</script>
