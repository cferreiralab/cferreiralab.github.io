<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>CFerreiraLab</title>

<style>

body {
    margin: 0;
    font-family: Arial;
    display: flex;
}


/* MENU GAUCHE */
.sidebar {
    width: 220px;
    background: #2c3e50;
    color: white;
    height: 100vh;
    padding: 20px;
}

.sidebar h2 {
    text-align: center;
}

.sidebar a {
    display: block;
    color: white;
    padding: 10px;
    text-decoration: none;
    margin: 5px 0;
    border-radius: 5px;
}

.sidebar a:hover {
    background: #34495e;
}

/* CONTENU */
.content {
    flex: 1;
    padding: 20px;
    background: #f4f6f8;
}

/* CARTES (étiquettes comme PhET) */
.card {
    display: inline-block;
    background: white;
    padding: 15px;
    margin: 10px;
    border-radius: 10px;
    width: 200px;
    box-shadow: 0px 0px 5px rgba(0,0,0,0.1);
    cursor: pointer;
}

.card:hover {
    transform: scale(1.05);
}

</style>
</head>

<body>

<!-- MENU -->
<div class="sidebar">
    <h2>🔬 CFerreiraLab</h2>

    <a onclick="show('titrage')">Titrage</a>
    <a onclick="show('spectro')">Spectro</a>
    <a onclick="show('maths')">Maths</a>
</div>

<!-- CONTENU -->
<div class="content" id="content">

</div>

<script>

function show(section) {

    let html = "";

    if(section === "titrage") {
        html = `
        <h2>Titrage</h2>

        <div class="card">Simulation simple</div>
        <div class="card">Dosage Fe²⁺</div>
        <div class="card">Courbe dérivée</div>
        `;
    }

    if(section === "spectro") {
        html = `
        <h2>Spectrophotométrie</h2>

        <div class="card">Loi de Beer-Lambert</div>
        <div class="card">Courbe d'étalonnage</div>
        `;
    }

    if(section === "maths") {
        html = `
        <h2>Maths</h2>

        <div class="card">Fonction exponentielle</div>
        <div class="card">Dérivée</div>
        `;
    }

    document.getElementById("content").innerHTML = html;
}

// affichage par défaut
show("titrage");

</script>

</body>
<div style="position:relative;">

    <!-- Bandeau -->
    <img src="bandeau LinkedIn.jpg" style="width:100%; height:200px; object-fit:cover;">

    <!-- Photo de profil -->
    <img src="photo.jpg" style="
        width:120px;
        height:120px;
        border-radius:50%;
        border:2px solid white;
        position:absolute;
        top:80px;
        left:40px;
        object-fit:cover;
        z-index:10;
    ">

    <!-- Nom -->
    <div style="
        position:absolute;
        top:150px;
        left:170px;
        color:white;
        z-index:10;
        background:rgba(0,0,0,0.4);
        padding:8px;
        border-radius:5px;
    ">
        <h2 style="margin:0;">Carlos Ferreira</h2>
        <p style="margin:0;">Professeur Maths-Sciences</p>
    </div>

</div>

</body>
</html>
