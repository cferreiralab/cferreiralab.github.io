<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>CFerreiraLab</title>

<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

<style>

html, body {
    height: 100%;
    margin: 0;
    font-family: Arial;
    background: #eef2f7;
}

.container {
    display: flex;
}

.contact-container {
    margin-top: auto;
    width: 100%;
}

/* HEADER */
.header {
    padding: 20px;
    border-bottom: 2px solid #2c3e50;
    background: white;
}

/* MENU */
.sidebar {
    width: 180px;
    background: #2c3e50;
    color: white;
    height: calc(100vh - 80px);
    padding: 15px;

    display: flex;
    flex-direction: column;

    box-sizing: border-box;
}

.sidebar a {
    display: block;
    color: white;
    padding: 10px;
    text-decoration: none;
    cursor: pointer;

    width: 100%;
    box-sizing: border-box;

    transition: background 0.2s, box-shadow 0.2s;

    border-radius: 8px;
    margin-bottom: 5px;

}

.sidebar a:hover {
    background: #34495e;
    border-radius: 8px;
}

.sidebar a.active {
    background: #3d566e;
    box-shadow: inset 4px 0 0 #5dade2;
    font-weight: 500;
}

.submenu {
    max-height: 0;
    overflow: hidden;
    margin-left: 10px;

    transition: max-height 0.3s ease, padding 0.5s;
}

.submenu.open {
    max-height: 200px; /* ajuste si besoin */
}

.submenu a {
    font-size: 13px;
    padding-left: 20px;
    background: #34495e;
}

.submenu a:hover {
    background: #3d566e;
}

.submenu a.active {
    background: #5dade2;
    color: white;
    font-weight: 500;
}

/* CONTENU */
.content {
    flex: 1;
    padding: 20px;
    text-align: center;
    height: calc(100vh - 80px);
    overflow-y: auto;
}

/* CARTES */
.card {
    position: relative; /* important */

    display: inline-flex;
    flex-direction: column;
    justify-content: space-between;

    width: 220px;
    height: 180px;

    padding: 15px 15px 15px 20px; /* 👈 plus à gauche */

    margin: 10px;

    background: white;
    border-radius: 8px;
    border: 1px solid #ddd;

    cursor: pointer;
    transition: 0.2s;
}

/* barre colorée à droite */

.card::after {
    content: "";
    position: absolute;
    top: 0;
    left: 0; /* 👈 au lieu de right */
    width: 6px;
    height: 100%;
    border-top-left-radius: 8px;
    border-bottom-left-radius: 8px;
}

.card:hover {
    background: #f0f0f0;
}

.card.contact {
    background: #2c3e50;
    color: white;
    font-weight: bold;
}

.card.contact:hover {
    background: #34495e;
}

.card.avenir::after {
    background: #d0d3d4; /* gris clair */
}

.card.bleu::after { background: #3498db; }        /* bleu */
.card.orange::after { background: #e67e22; }      /* orange */
.card.vert::after { background: #2ecc71; }        /* vert */
.card.violet::after { background: #9b59b6; }      /* violet */
.card.rouge::after { background: #e74c3c; }       /* rouge */


</style>
</head>

<body>

<!-- =========================
     HEADER
     ========================= -->
<div class="header">
    <h1 style="margin:0;">CFerreiraLab</h1>
    <p style="margin:5px 0 0;">
        Mathématiques, Physique et Chimie – Simulations et prototypage
    </p>
</div>

<div class="container">

    <!-- =========================
         MENU LATÉRAL
         ========================= -->
    <div class="sidebar">

        <!-- 🔹 MENU PRINCIPAL -->
        <div>

            <!-- Accueil -->
            <a data-section="accueil" onclick="show('accueil')">
                Accueil
            </a>

            <!-- Electrochimie -->
            <div>
                <a data-section="electrochimie" onclick="openSection('electrochimie')">
                    Electrochimie
                </a>

                <!-- Sous-menu -->
                <div id="submenu-electrochimie" class="submenu">
                    <a data-section="potentiometrie" onclick="show('potentiometrie', this)">
                        Potentiométrie
                    </a>
                </div>
            </div>

            <!-- Autres sections -->
            <a data-section="videos" onclick="show('videos')">
                Vidéos TP
            </a>

            <a data-section="maths" onclick="show('maths')">
                Maths
            </a>

        </div>

        <!-- 🔹 MENU BAS : CONTACT -->
        <div class="contact-container">
            <a data-section="contact" onclick="show('contact')">
                Contact
            </a>
        </div>

    </div>

    <!-- =========================
         ZONE DE CONTENU
         ========================= -->
    <div class="content" id="content"></div>

</div>
<script>

/* =========================
   MAPPING DES SECTIONS
   ========================= */

// 🔹 Permet de relier sous-sections → sections principales
const sectionMap = {
    "potentiometrie": "electrochimie",

    "iE_eau_pH": "potentiometrie",
    "dosage_potentio_nul": "potentiometrie",
    "surtensions_electrodes": "potentiometrie",
    "diffusion_limite": "potentiometrie",
    "dosage_fe_mno4_courant": "potentiometrie",

    "video_viscosite": "videos",
    "video_tension": "videos"
};


/* =========================
   UTILITAIRES MENU
   ========================= */

// 🔹 Ferme tous les sous-menus
function closeAllSubmenus() {
    document.querySelectorAll(".submenu").forEach(menu => {
        menu.classList.remove("open");
    });
}


/* =========================
   NAVIGATION PRINCIPALE
   ========================= */

// 🔹 Ouvre une section principale + affiche son contenu
function openSection(section) {

    // 🔹 Ferme tous les sous-menus
    closeAllSubmenus();

    // 🔹 Ouvre le sous-menu associé
    const submenu = document.getElementById("submenu-" + section);
    if (submenu) submenu.classList.add("open");

    // 🔹 Affiche la section
    show(section);
}


// 🔹 Accès direct à une simulation (depuis une carte)
function goToSimu(section, parentSection) {
    const el = document.querySelector(`[data-section="${parentSection}"]`);
    show(section, el);
}


// 🔹 Toggle manuel d’un sous-menu
function toggleSection(section) {

    const submenu = document.getElementById("submenu-" + section);

    if (submenu.style.display === "block") {
        submenu.style.display = "none";
    } else {
        submenu.classList.add("open");
    }

    // 🔹 Met à jour le contenu affiché
    show(section);
}


// 🔹 Navigation simple vers une section
function go(section) {
    const el = document.querySelector(`[data-section="${section}"]`);
    show(section, el);
}

function show(section, el = null) {

  /* =========================
   1. DÉTERMINER LES NIVEAUX
   ========================= */

// 🔹 Sous-section (ex : iE_eau_pH → potentiometrie)
const subSection = sectionMap[section] || section;

// 🔹 Section principale (ex : potentiometrie → electrochimie)
const mainSection = sectionMap[subSection] || subSection;


/* =========================
   2. GESTION DU MENU
   ========================= */

// 🔹 Ferme tous les sous-menus
closeAllSubmenus();

// 🔹 Ouvre le sous-menu correspondant
const submenu = document.getElementById("submenu-" + mainSection);
if (submenu) submenu.classList.add("open");

// 🔹 Désactive tous les liens du menu
document.querySelectorAll(".sidebar a").forEach(link => {
    link.classList.remove("active");
});

// 🔹 Active la section principale
const mainBtn = document.querySelector(
    `.sidebar a[data-section="${mainSection}"]`
);

if (mainBtn) {
    mainBtn.classList.add("active");
}

// 🔹 Active aussi la sous-section
const subBtn = document.querySelector(
    `.submenu a[data-section="${subSection}"]`
);

if (subBtn) {
    subBtn.classList.add("active");
}

// 🔹 Si un bouton spécifique est fourni
if (el) {
    el.classList.add("active");
}


/* =========================
   3. PRÉPARATION DU CONTENU
   ========================= */

let html = "";

if(section === "contact") {

    const user = "carlos.ferreira1";
    const domain = "ac-nantes.fr";
    const mail = user + "@" + domain;

    html = `
    <h2>Contact</h2>

    <p>
    Vous pouvez me contacter pour toute question, projet ou collaboration.
    </p>

    <div class="card contact" onclick="window.location.href='mailto:${mail}'">
        📧 Me contacter
    </div>

    <p style="font-size:12px; color:#777;">
    Ou adresse : ${mail}
    </p>
    `;
}

/* =========================
   SECTION : ACCUEIL
   ========================= */

if(section === "accueil") {

    // 🔹 Contenu HTML affiché dans la zone principale
    html = `

    </p>

    <!-- Public cible (affiché en plus discret) -->
    <p style="color:#777; font-size:14px;">
        BTS • IUT • Lycée professionnel
    </p>

    <!-- Instruction utilisateur -->
    <p>
        Sélectionnez une catégorie dans le menu de gauche.
    </p>

    `;
}

/* =========================
   SECTION : ELECTROCHIMIE
   ========================= */

if(section === "electrochimie") {

    // 🔹 Contenu HTML injecté dans la page

    <div class='card bleu' onclick="go('potentiometrie')">

        <!-- Titre de la carte -->
        <strong>Potentiométrie</strong><br>

        <!-- Description courte (niveau compréhension) -->
        <span style="font-size:13px; color:#666;">
            Étude des courbes i = f(E) et des phénomènes électrochimiques associés

        <br><br>

        <!-- Mots-clés (niveau technique / résumé rapide) -->
        <span style="font-size:12px; color:#888;">
            Stabilité de l'eau • Surtensions • Courants limites • Dosage Fe²⁺
        </span>

    </div>
    `;
}

/* =========================
   SECTION : POTENTIOMÉTRIE
   ========================= */

if(section === "potentiometrie") {

    // 🔹 Contenu HTML de la page
    html = `

    <!-- Titre de la section -->
    <h2>Potentiométrie</h2>


    <!-- =========================
         CARTE 1 : Domaine de stabilité de l'eau
         ========================= -->
    <div class='card bleu' onclick="show('iE_eau_pH')">

        <!-- Titre -->
        <strong>
            Courbes i = f(E) <br>
            domaine de stabilité de l'eau
        </strong><br>

        <!-- Description -->
        <span style="font-size:13px; color:#666;">

        </span>

        <br><br>

        <!-- Mots-clés -->
        <span style="font-size:12px; color:#888;">

    <!-- =========================
         CARTE 2 : Surtensions électrodes

    <div class='card avenir' onclick="show('surtensions_electrodes')">

        <!-- Titre -->
        <strong>

        <!-- Description -->

        </span>

        <!-- Mots-clés -->
        <span style="font-size:12px; color:#888;">

        </span>
    </div>


    <!-- =========================
         CARTE 3 : Courant limite
         ========================= -->
    <div class='card avenir' onclick="show('diffusion_limite')">

        <!-- Titre -->
        <strong>
            Courant limite de diffusion

        <!-- Description -->
        <span style="font-size:13px; color:#666;">

    </div>


    <!-- =========================
         CARTE 4 : Dosage (courant nul)
         ========================= -->
    <div class='card violet' onclick="show('dosage_potentio_nul')">

        <!-- Titre -->
        <strong>
            Dosage Fe²⁺ par MnO₄⁻ <br>
            potentiométrie à courant nul

        <!-- Description -->
        <span style="font-size:13px; color:#666;">

        </span>

        <br><br>

        <!-- Mots-clés -->
        <span style="font-size:12px; color:#888;">
            Équivalence • Courbe E = f(V) • Oxydoréduction
        </span>
    </div>


    <!-- =========================
         CARTE 5 : Dosage (courant imposé)
         ========================= -->
    <div class='card avenir' onclick="show('dosage_fe_mno4_courant')">

        <!-- Titre -->
        <strong>
            Dosage Fe²⁺ / MnO₄⁻ <br>
            courant imposé
        </strong><br>

        <!-- Description -->
        <span style="font-size:13px; color:#666;">
            Courant constant • Évolution du potentiel
        </span>

        <br><br>

        <!-- Mots-clés -->
        <span style="font-size:12px; color:#888;">
            E = f(t) • Équivalence • Rupture de pente
        </span>
    </div>

    `;
}


/* =========================
   SIMULATION : i = f(E) de l’eau
   ========================= */

if (section === "iE_eau_pH") {

    // 🔹 Chargement de la simulation via iframe
    document.getElementById("content").innerHTML = `
        <iframe src="iE_eau_pH.html"
                style="width:100%; height:100%; border:none;">
        </iframe>
    `;

    return; // 🔥 stop ici (pas de html classique)
}


if (section === "dosage_potentio_nul") {
    console.log("Chargement dosage_potentio_nul"); // 👈 debug

    document.getElementById("content").innerHTML = `
        <iframe src="dosage_potentio_nul.html"
                style="width:100%; height:100%; border:none;">
        </iframe>
    `;

    return;
}



/* =========================
   SECTION : SURTENSIONS ÉLECTRODES
   ========================= */

if (section === "surtensions_electrodes") {

    html = `

    <!-- Titre -->
    <h2>Influence des électrodes</h2>

    <!-- Contenu temporaire -->
    <p>Simulation à venir...</p>

    `;
}


/* =========================
   SECTION : DIFFUSION LIMITE
   ========================= */

if (section === "diffusion_limite") {

    html = `

    <!-- Titre -->
    <h2>Courant limite de diffusion</h2>

    <!-- Contenu temporaire -->
    <p>Simulation à venir...</p>

    `;
}


/* =========================
   SECTION : DOSAGE Fe²⁺ / MnO₄⁻ (courant imposé)
   ========================= */

if (section === "dosage_fe_mno4_courant") {

    html = `

    <!-- Titre -->
    <h2>Dosage Fe²⁺ par MnO₄⁻</h2>

    <!-- Contenu temporaire -->
    <p>Simulation à venir...</p>

    `;
}
/* =========================
   SECTION : VIDÉOS DE TP
   ========================= */

if (section === "videos") {

    // 🔹 Contenu HTML injecté dans la zone principale
    html = `

    <!-- Titre de la section -->
    <h2>Vidéos de TP</h2>

<!-- =========================
     CARTE : Viscosité
     ========================= -->
<div class='card avenir' onclick="show('video_viscosite')">

    <!-- Titre -->
    <strong>
        Viscosité <br>
        chute de bille
    </strong><br>

    <!-- Description -->
    <span style="font-size:13px; color:#666;">
        Détermination de la viscosité d’un fluide par mesure de vitesse limite
    </span>

    <br><br>

    <!-- Mots-clés -->
    <span style="font-size:12px; color:#888;">
        Loi de Stokes • Vitesse limite • Forces de frottement • Reynolds
    </span>

</div>

<!-- =========================
     CARTE : Tension superficielle
     ========================= -->
<div class='card avenir' onclick="show('video_tension')">

    <!-- Titre -->
    <strong>
        Tension superficielle <br>
        anneau de Du Noüy
    </strong><br>

    <!-- Description -->
    <span style="font-size:13px; color:#666;">
        Mesure de la tension superficielle d’un liquide par arrachement d’un anneau
    </span>

    <br><br>

    <!-- Mots-clés -->
    <span style="font-size:12px; color:#888;">
        Forces interfaciales • Mouillage • Capillarité • Du Noüy
    </span>

</div>

    `;
}

/* =========================
   SECTION : VIDEO VISCOSITÉ
   ========================= */

if (section === "video_viscosite") {

    html = `

    <h2>
        Viscosité – chute de bille
    </h2>

    <p>
        Vidéo à venir...
    </p>

    `;
}


/* =========================
   SECTION : VIDEO TENSION
   ========================= */

if (section === "video_tension") {

    html = `

    <h2>
        Tension superficielle – anneau de Du Noüy
    </h2>

    <p>
        Vidéo à venir...
    </p>

    `;
}

/* =========================
   SECTION : MATHÉMATIQUES
   ========================= */

if (section === "maths") {

    // 🔹 Contenu HTML de la section
    html = `

    <!-- Titre de la section -->
    <h2>Mathématiques</h2>

<!-- =========================
     CARTE : Brachistochrone
     ========================= -->
<div class='card avenir' onclick="show('brachistochrone')">

    <!-- Titre -->
    <strong>
        Problème de la <br>
        brachistochrone
    </strong><br>

    <!-- Description -->
    <span style="font-size:13px; color:#666;">
        Recherche de la courbe de descente la plus rapide sous l’effet de la gravité
    </span>

    <br><br>

    <!-- Mots-clés -->
    <span style="font-size:12px; color:#888;">
        Cycloïde • Temps minimal • Gravitation • Calcul variationnel
    </span>

</div>

    `;
}


    document.getElementById("content").innerHTML = html;
}

show("accueil");

</script>
