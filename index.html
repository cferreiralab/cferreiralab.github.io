<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>CFerreiraLab - Simulations</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>

<body style="font-family: Arial; text-align: center; background: #f4f6f8;">

<h1>🔬 CFerreiraLab</h1>
<h2>Simulation de titrage (modèle simplifié)</h2>

<p>Volume équivalent (mL) :</p>

<input type="range" id="slider" min="5" max="20" value="10" step="0.5">
<span id="val">10</span>

<div id="graph" style="width:80%; margin:auto;"></div>

<script>

const slider = document.getElementById("slider");
const val = document.getElementById("val");

slider.oninput = function() {
    val.innerHTML = this.value;
    updateGraph();
};

function updateGraph() {

    let x = [];
    let y = [];
    let veq = parseFloat(slider.value);

    for (let v = 0; v <= 25; v += 0.2) {
        x.push(v);
        y.push(200 + 300 / (1 + Math.exp(-(v - veq))));
    }

    Plotly.newPlot('graph', [{
        x: x,
        y: y,
        mode: 'lines',
        name: "Courbe de titrage"
    }], {
        title: "Simulation interactive",
        xaxis: {title: "Volume ajouté (mL)"},
        yaxis: {title: "Potentiel (mV)"}
    });
}

updateGraph();

</script>

</body>
</html>
