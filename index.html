<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>CFerreiraLab</title>

<style>

/* =========================
   STRUCTURE GÉNÉRALE
========================= */

/* Le body contient tout le site */
body {
    margin: 0;              /* enlève les marges par défaut */
    font-family: Arial;     /* police du site */
}

/* =========================
   MENU LATÉRAL (GAUCHE)
========================= */

.sidebar {
    width: 220px;           /* largeur du menu */
    background: #2c3e50;    /* couleur de fond */
    color: white;           /* couleur du texte */
    height: 100vh;          /* prend toute la hauteur de l'écran */
    padding: 20px;          /* espace intérieur */
}

/* Titre du menu */
.sidebar h2 {
    text-align: center;     /* centré */
}

/* Liens du menu */
.sidebar a {
    display: block;         /* chaque lien prend toute la ligne */
    color: white;
    padding: 10px;
    text-decoration: none;  /* enlève le soulignement */
    margin: 5px 0;
    border-radius: 5px;
}

/* Effet au survol */
.sidebar a:hover {
    background: #34495e;
}

/* =========================
   ZONE CONTENU (DROITE)
========================= */

.content {
    flex: 1;                /* prend tout l’espace restant */
    padding: 20px;
    background: #f4f6f8;
}

/* =========================
   CARTES (simulations)
========================= */

.card {
    display: inline-block;  /* permet d’avoir plusieurs cartes côte à côte */
    background: white;
    padding: 15px;
    margin: 10px;
    border-radius: 10px;
    width: 200px;
    box-shadow: 0px 0px 5px rgba(0,0,0,0.1);
    cursor: pointer;        /* curseur cliquable */
}

/* Effet zoom au survol */
.card:hover {
    transform: scale(1.05);
}

</style>
</head>

<body>

<!-- =========================
     EN-TÊTE (BANDEAU + PHOTO)
========================= -->

<div style="
    background:white;
    border-bottom:2px solid #2c3e50;
    padding:20px 30px;
">

    <h1 style="
        margin:0;
        color:#2c3e50;
        font-weight:500;
    ">
        CFerreiraLab
    </h1>

    <p style="
        margin:5px 0 0;
        color:#555;
        font-size:14px;
    ">
        Simulations en mathématiques, physique et chimie – Outils pédagogiques
    </p>

</div>

<!-- =========================
     MENU + CONTENU
========================= -->

<div style="display:flex;">

    <div class="sidebar">
        <h2>🔬 CFerreiraLab</h2>

        <a onclick="show('titrage')">Titrage</a>
        <a onclick="show('spectro')">Spectro</a>
        <a onclick="show('maths')">Maths</a>
    </div>

    <div class="content" id="content">
    </div>

</div>

<!-- =========================
     SCRIPT JAVASCRIPT
========================= -->

<script>

/* Fonction qui affiche le contenu selon le menu */
function show(section) {

    let html = "";  // variable qui contiendra le contenu

    /* === CAS 1 : TITRAGE === */
    if(section === "titrage") {
        html = `
        <h2>Titrage</h2>

        <div class="card">Simulation simple</div>
        <div class="card">Dosage Fe²⁺</div>
        <div class="card">Courbe dérivée</div>
        `;
    }

    /* === CAS 2 : SPECTRO === */
    if(section === "spectro") {
        html = `
        <h2>Spectrophotométrie</h2>

        <div class="card">Loi de Beer-Lambert</div>
        <div class="card">Courbe d'étalonnage</div>
        `;
    }

    /* === CAS 3 : MATHS === */
    if(section === "maths") {
        html = `
        <h2>Maths</h2>

        <div class="card">Fonction exponentielle</div>
        <div class="card">Dérivée</div>
        `;
    }

    /* Injection du contenu dans la page */
    document.getElementById("content").innerHTML = html;
}

/* Affichage par défaut au chargement */
show("titrage");

</script>

</body>
</html>
