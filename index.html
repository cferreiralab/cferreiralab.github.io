<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>CFerreiraLab</title>

<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
}

/* MENU */
.sidebar {
    width: 180px;
    background: #2c3e50;
    color: white;
    height: 100vh;
    padding: 15px;
}

.sidebar a {
    display: block;
    color: white;
    padding: 10px;
    text-decoration: none;
}

.sidebar a:hover {
    background: #34495e;
}

/* CONTENU */
.container {
    display: flex;
}

.content {
    flex: 1;
    padding: 20px;
    text-align: center;
}

/* CARTES */
.card {
    display: inline-block;
    width: 220px;
    padding: 15px;
    margin: 10px;
    background: white;
    border-radius: 8px;
    border: 1px solid #ddd;
    text-align: center;
    cursor: pointer;
    transition: 0.2s;
}

.card:hover {
    background: #f0f0f0;
}
</style>
</head>

<body>

<!-- HEADER -->
<div style="padding:20px; border-bottom:2px solid #2c3e50;">
    <h1 style="margin:0;">CFerreiraLab</h1>
    <p style="margin:5px 0 0;">
        Mathématiques, Physique et Chimie – Simulations et prototypage
    </p>
</div>

<div class="container">
 
    <!-- MENU -->
    <div class="sidebar">
        <a onclick="show('accueil')">Accueil</a>
        <a onclick="show('Electrochimie')">Electrochimie</a>
        <a onclick="show('Spectro')">Spectro</a>
        <a onclick="show('Maths')">Maths</a>
    </div>

    <!-- CONTENU -->
    <div class="content" id="content">
    </div>

</div>

<script>

function show(section) {

    let html = "";

    if(section === "accueil") {
        html = `
        <h2>Bienvenue</h2>

        <p>
        Ce site propose des simulations interactives en mathématiques,
        physique et chimie.
        </p>

        <p style="color:#777; font-size:14px;">
        BTS • IUT • Lycée professionnel
        </p>

        <p>
        Sélectionnez une catégorie dans le menu de gauche.
        </p>
        `;
    }

    if(section === "Electrochimie") {
        html = `
        <h2>Electrochimie</h2>

        <div class='card' onclick="show('iE_eau_pH')">
            <strong>Potentiométrie</strong><br>
            <span style="font-size:13px; color:#666;">
                i,E de l'eau en fonction du pH
            </span>
        </div>
        `;

    }

    if(section === "iE_eau_pH") {
    document.getElementById("content").innerHTML = `
        <iframe src="iE_eau_pH.html"
                style="width:100%; height:90vh; border:none;">
        </iframe>
    `;
    return;
}

    if(section === "Spectro") {
        html = "<h2>Spectro</h2><div class='card'>Beer-Lambert</div>";
    }

    if(section === "Maths") {
        html = "<h2>Electrochochimie</h2><div class='card'>iE_eau_pH</div>";
    }

    document.getElementById("content").innerHTML = html;
}

show("accueil");

</script>

</body>
</html>
